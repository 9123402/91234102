<h1>台南擔仔麵</h1>
<img src="001.png">

<h2>📜 典故</h2>
<p>
擔仔麵起源於清朝光緒年間，由漁民在海象不佳時挑著擔子沿街販售，
以蝦頭熬湯、肉燥提味，成為台南最具代表性的庶民美食。
</p>

<h2>🍳 食材</h2>
<ul>
<li>油麵</li><li>蝦子</li><li>豬絞肉</li><li>蒜末</li><li>香菜</li>
</ul>

<h2>👩‍🍳 作法</h2>
<ol>
<li>蝦殼炒香後熬成高湯。</li>
<li>絞肉與蒜末炒成肉燥。</li>
<li>麵條燙熟放碗中。</li>
<li>加入肉燥與蝦子，淋上高湯。</li>
</ol>
