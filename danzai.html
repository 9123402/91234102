<h1>台南擔仔麵</h1>

<h2>📜 美食典故</h2>
<p>
擔仔麵起源於清朝光緒年間，最早由一位在台南沿海討海維生的漁民所創。
漁民在海象不佳時，便挑著扁擔沿街叫賣麵食，因此得名「擔仔麵」。
湯頭以蝦殼、蝦頭長時間熬煮，味道鮮甜，是台南小吃的代表之一。
</p>

<h2>🍳 食材準備</h2>
<ul>
    <li>油麵或細麵條</li>
    <li>蝦子 2～3 隻</li>
    <li>豬絞肉 100g</li>
    <li>蒜末、紅蔥頭</li>
    <li>香菜、豆芽菜</li>
</ul>

<h2>👩‍🍳 作法步驟</h2>
<ol>
    <li>蝦殼與蝦頭炒香後加水熬成高湯。</li>
    <li>豬絞肉加入蒜末、紅蔥頭炒成肉燥。</li>
    <li>麵條燙熟後放入碗中。</li>
    <li>加入肉燥、蝦子、豆芽菜。</li>
    <li>淋上熱騰騰的蝦湯，撒上香菜即可。</li>
</ol>
