<h1>台南蝦捲</h1>
<img src="004.png">

<h2>📜 典故</h2>
<p>
蝦捲源自台南沿海，利用新鮮火燒蝦與魚漿，
是台南宴席與小吃攤必備料理。
</p>

<h2>🍳 食材</h2>
<ul>
<li>蝦仁</li><li>魚漿</li><li>豬腹膜</li><li>芹菜</li>
</ul>

<h2>👩‍🍳 作法</h2>
<ol>
<li>蝦仁切碎拌魚漿。</li>
<li>包入腹膜。</li>
<li>油炸至金黃。</li>
<li>切段沾醬食用。</li>
</ol>
