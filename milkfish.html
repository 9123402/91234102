<h1>高雄虱目魚粥</h1>
<img src="002.png">

<h2>📜 典故</h2>
<p>
高雄為台灣虱目魚重要產地，虱目魚粥以新鮮無腥味著稱，
是高雄人常見的早餐與家常料理。
</p>

<h2>🍳 食材</h2>
<ul>
<li>虱目魚肚</li><li>白飯</li><li>薑絲</li><li>蔥花</li>
</ul>

<h2>👩‍🍳 作法</h2>
<ol>
<li>魚骨熬煮成乳白色高湯。</li>
<li>加入米飯煮成粥。</li>
<li>放入魚肚、薑絲。</li>
<li>起鍋前灑上蔥花。</li>
</ol>
