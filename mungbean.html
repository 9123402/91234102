<h1>屏東綠豆蒜</h1>
<img src="005.png">

<h2>📜 典故</h2>
<p>
綠豆蒜是屏東車城特色甜品，「蒜」指去皮綠豆形似蒜瓣，
是消暑解熱的傳統甜湯。
</p>

<h2>🍳 食材</h2>
<ul>
<li>去皮綠豆</li><li>砂糖</li><li>太白粉</li>
</ul>

<h2>👩‍🍳 作法</h2>
<ol>
<li>綠豆煮至軟爛。</li>
<li>加入糖水。</li>
<li>太白粉勾芡。</li>
<li>冷熱皆可食用。</li>
</ol>
