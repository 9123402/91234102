<h1>萬丹紅豆餅</h1>
<img src="003.png">

<h2>📜 典故</h2>
<p>
屏東萬丹盛產紅豆，紅豆餅以皮薄餡多聞名，
是台灣最具代表性的街頭甜點之一。
</p>

<h2>🍳 食材</h2>
<ul>
<li>紅豆</li><li>砂糖</li><li>低筋麵粉</li><li>雞蛋</li>
</ul>

<h2>👩‍🍳 作法</h2>
<ol>
<li>紅豆煮爛後拌糖成餡。</li>
<li>麵糊倒入模具。</li>
<li>加入紅豆餡。</li>
<li>烘烤至金黃。</li>
</ol>
